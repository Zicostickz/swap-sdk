[project]
name = "swap-sdk"
authors = ["SwapSDK Team"]
description = "A decentralized swap pool for token liquidity and exchange"
telemetry = false
requirements = []
[contracts.swap-pool]
path = "contracts/swap-pool.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
